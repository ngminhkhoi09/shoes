<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ShoeShop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        /* HEADER */
        .header {
            background: #ff5722;
            color: white;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .search input {
            width: 400px;
            height: 35px;
            border: none;
            padding: 10px;
            border-radius: 5px;
        }

        .cart {
            font-size: 20px;
            cursor: pointer;
        }

        /* CATEGORY */
        .category {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 30px;
        }

        .cat-item {
            width: 120px;
            height: 120px;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .cat-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .cat-item h3 {
            font-size: 14px;
        }

        /* PRODUCTS GRID */
        .products {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            padding: 0 30px 30px 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Tối ưu phần hiển thị ảnh trong Card */
        .card img {
            width: 100%;
            aspect-ratio: 1 / 1; /* Tạo khung hình vuông cho ảnh */
            object-fit: cover;    /* Ảnh phủ kín khung mà không bị méo */
            background-color: #f9f9f9;
        }

        .card h3 {
            font-size: 15px;
            padding: 15px 10px 5px 10px;
            height: 50px; /* Đảm bảo tiêu đề dài không làm lệch hàng */
            overflow: hidden;
        }

        .price {
            color: #ff5722;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 16px;
        }

        .card button {
            margin: 15px 10px;
            height: 35px;
            border: none;
            background: #ff5722;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .card button:hover {
            opacity: 0.9;
        }

        /* FOOTER */
        .footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Shoes Store</div>
    <div class="search">
        <input type="text" placeholder="Tìm kiếm giày...">
    </div>
    <div class="cart">🛒</div>
</div>

<div class="category">
     <div class="cat-item">
        <img src="images/nike.png" alt="Nike">
        <h3>Nike</h3>
     </div>
     <div class="cat-item">
        <img src="images/adidas.png" alt="Adidas">
        <h3>Adidas</h3>
     </div>
     <div class="cat-item">
        <img src="images/puma.png" alt="Puma">
        <h3>Puma</h3>
     </div>
     <div class="cat-item">
        <img src="images/converse.png" alt="Converse">
        <h3>Converse</h3>
     </div>
     <div class="cat-item">
        <img src="images/Vans.png" alt="Vans">
        <h3>Vans</h3>
     </div>
</div>

<div class="products">
    <div class="card">
        <img src="images/Giày Nike Air Force 1.png" alt="Nike AF1">
        <h3>Giày Nike Air Force 1</h3>
        <div class="price">1.200.000đ</div>
        <button>Mua</button>
    </div>

    <div class="card">
        <img src="images/Giày Adidas UltraBoost.png" alt="Adidas UltraBoost">
        <h3>Giày Adidas UltraBoost</h3>
        <div class="price">1.500.000đ</div>
        <button>Mua</button>
    </div>

    <div class="card">
        <img src="images/Giày Puma RS-X.png" alt="Puma RS-X">
        <h3>Giày Puma RS-X</h3>
        <div class="price">1.100.000đ</div>
        <button>Mua</button>
    </div>

    <div class="card">
        <img src="images/Giày Converse 1970s.png" alt="Converse">
        <h3>Giày Converse 1970s</h3>
        <div class="price">900.000đ</div>
        <button>Mua</button>
    </div>

    <div class="card">
        <img src="images/Giày Vans Old Skool.png" alt="Vans">
        <h3>Giày Vans Old Skool</h3>
        <div class="price">800.000đ</div>
        <button>Mua</button>
    </div>
</div>

<div class="footer">
    © 2026 Shoes Store | Liên hệ: 0919856353
</div>

</body>
</html>
